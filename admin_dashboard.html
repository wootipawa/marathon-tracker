<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Marathon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #080808;
  color: #fff;
  padding: 24px 20px;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 18px;
}
.top-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.top-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
  letter-spacing: 0.08em;
}
.live-badge {
  background: transparent;
  border: 1px solid #4ade80;
  color: #4ade80;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 14px;
  letter-spacing: .1em;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 6px; height: 6px;
  background: #4ade80;
  display: inline-block;
  animation: bl 1.4s infinite;
}
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

/* ── RUNNER CARD ── */
.runner-card {
  background: #111111;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 3px solid var(--card-color, #4ade80);
  padding: 16px;
  position: relative;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.rank-badge {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  background: var(--card-color, #4ade80);
  color: #000;
  flex-shrink: 0;
}
.runner-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.runner-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
  letter-spacing: 0.04em;
}

/* ── PROGRESS ── */
.bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.07);
  margin-bottom: 8px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  transition: width 1s ease;
  background: var(--card-color, #4ade80);
}
.km-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 16px;
}
.km-main {
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
}
.km-of { color: rgba(255,255,255,0.3); font-size: 12px; }

/* ── CONTROLS ── */
.controls {
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 14px;
  display: grid;
  gap: 10px;
}
.ctrl-label {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
}
.ctrl-row { display: flex; gap: 8px; }
.ctrl-row input {
  flex: 1; padding: 8px 10px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  font-family: 'Sarabun', sans-serif;
  outline: none;
}
.ctrl-row input:focus { border-color: var(--card-color, #4ade80); }
.btn-set {
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  cursor: pointer;
  letter-spacing: 0.05em;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
}
.btn-set:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.3); }
.btn-set:active { background: rgba(255,255,255,0.12); }
.btn-set.alt { border-color: var(--card-color,#4ade80); color: var(--card-color,#4ade80); }
.btn-set.alt:hover { background: rgba(255,255,255,0.05); }

/* ── COLOR TOGGLE ── */
.color-toggle-btn {
  width: 100%;
  padding: 7px 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.15s;
}
.color-toggle-btn:hover { border-color: var(--card-color,#4ade80); color: #fff; }
.color-toggle-btn .swatch-preview {
  width: 12px; height: 12px;
  background: var(--card-color, #4ade80);
  display: inline-block;
  flex-shrink: 0;
}
.color-panel {
  display: none;
  padding: 10px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: none;
}
.color-panel.open { display: block; }
.color-palette {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.color-swatch {
  aspect-ratio: 1;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: #fff; }
.color-swatch.active::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  font-weight: 800;
  font-size: 13px;
}

/* ── LOG ── */
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 10px;
}
.log-box {
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  line-height: 2;
  max-height: 160px;
  overflow-y: auto;
  font-family: monospace;
}
.log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 2px; }
.log-entry:last-child { border-bottom: none; }
.conn-status {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 14px;
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

<div class="top">
  <div>
    <div class="top-title">Marathon Admin</div>
    <div class="top-sub">ติดตาม 4 นักวิ่ง · ตั้งสีและระยะเป้าหมาย</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button onclick="initRunners()" style="
      background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);
      font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:0.1em;padding:4px 12px;
      cursor:pointer;text-transform:uppercase;transition:all 0.15s;
    " onmouseover="this.style.borderColor='#fff';this.style.color='#fff'"
       onmouseout="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='rgba(255,255,255,0.4)'">
      INIT RUNNERS
    </button>
    <div class="live-badge"><span class="dot"></span>LIVE</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="section-title">ประวัติการอัปเดต</div>
<div class="log-box" id="logBox">รอข้อมูล...</div>
<div class="conn-status" id="connStatus">กำลังเชื่อมต่อ Firebase...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const PALETTE = [
  '#FACC15','#EC4899','#22D3EE','#A855F7',
  '#10ff49','#F97316','#EF4444','#FFFFFF',
  '#3B82F6','#06B6D4','#F59E0B','#84CC16',
];
const DEFAULT_COLORS = ['#FACC15','#EC4899','#22D3EE','#A855F7'];

const logs = [];
function addLog(msg) {
  const t = new Date().toLocaleTimeString('th-TH');
  logs.unshift('['+t+'] '+msg);
  if (logs.length > 30) logs.pop();
  document.getElementById('logBox').innerHTML = logs.map(l=>`<div class="log-entry">${l}</div>`).join('');
}

window.manualSet = function(key) {
  const val = parseFloat(document.getElementById('inp_'+key).value);
  const goal = parseFloat(document.getElementById('goalInp_'+key).value) || 42;
  if (isNaN(val) || val < 0 || val > goal) { alert('ใส่ตัวเลข 0–'+goal+' กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/'+key+'/km'), parseFloat(val.toFixed(2)));
  addLog(`[Manual] ${name} → ${val.toFixed(2)} กม.`);
};

window.setGoal = function(key) {
  const val = parseFloat(document.getElementById('goalInp_'+key).value);
  if (isNaN(val) || val < 1 || val > 200) { alert('ใส่เป้าหมาย 1–200 กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/'+key+'/goal'), val);
  addLog(`[Goal] ${name} → ${val} กม.`);
};

window.initRunners = async function() {
  if (!confirm('สร้างข้อมูลเริ่มต้นทั้ง 4 คน? (จะ reset km เป็น 0)')) return;
  const defaults = [
    { name: 'Runner 1', goal: 42, color: '#FACC15' },
    { name: 'Runner 2', goal: 42, color: '#EC4899' },
    { name: 'Runner 3', goal: 42, color: '#22D3EE' },
    { name: 'Runner 4', goal: 42, color: '#A855F7' },
  ];
  for (let i = 0; i < 4; i++) {
    const key = 'runner'+(i+1);
    const existing = (window._cur[key] || {});
    await set(ref(db, 'runners/'+key), {
      name:  existing.name  || defaults[i].name,
      goal:  existing.goal  || defaults[i].goal,
      color: existing.color || defaults[i].color,
      km: 0,
    });
  }
  addLog('[Init] สร้างข้อมูลนักวิ่ง 4 คนเรียบร้อย');
};
  const val = document.getElementById('nameInp_'+key).value.trim();
  if (!val) { alert('ใส่ชื่อนักวิ่งด้วยครับ'); return; }
  set(ref(db, 'runners/'+key+'/name'), val);
  addLog(`[Name] runner${key.slice(-1)} → ${val}`);
};
  set(ref(db, 'runners/'+key+'/color'), color);
  const name = (window._cur[key] || {}).name || key;
  addLog(`[Color] ${name} → ${color}`);
};

window.toggleColor = function(key) {
  const panel = document.getElementById('colorPanel_'+key);
  panel.classList.toggle('open');
};

window._cur = {};

function renderCard(key, data, idx) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = data.name || ('นักวิ่ง '+(idx+1));
  const color = data.color || DEFAULT_COLORS[idx];
  const pct = Math.min(100, (km/goal)*100);
  const acc = data.acc ? '±'+data.acc+'ม.' : '—';

  const swatches = PALETTE.map(c =>
    `<div class="color-swatch ${c.toLowerCase()===color.toLowerCase()?'active':''}"
          style="background:${c}"
          onclick="setColor('${key}','${c}')"
          title="${c}"></div>`
  ).join('');

  return `
  <div class="runner-card" style="--card-color:${color}">
    <div class="card-header">
      <div class="rank-badge">${idx+1}</div>
      <div>
        <div class="runner-name">${name}</div>
        <div class="runner-sub">GPS: ${acc}</div>
      </div>
    </div>

    <div class="bar-wrap"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
    <div class="km-row">
      <span class="km-main">${km.toFixed(2)} KM</span>
      <span class="km-of">/ ${goal} km · ${pct.toFixed(0)}%</span>
    </div>

    <div class="controls">

      <div>
        <span class="ctrl-label">ชื่อนักวิ่ง</span>
        <div class="ctrl-row">
          <input type="text" id="nameInp_${key}" placeholder="${name}" value="${name}">
          <button class="btn-set alt" onclick="setName('${key}')">SET</button>
        </div>
      </div>

      <div>
        <span class="ctrl-label">เป้าหมาย (กม.)</span>
        <div class="ctrl-row">
          <input type="number" id="goalInp_${key}" min="1" max="200" step="1" value="${goal}">
          <button class="btn-set alt" onclick="setGoal('${key}')">SET</button>
        </div>
      </div>

      <div>
        <span class="ctrl-label">แก้ระยะด้วยมือ</span>
        <div class="ctrl-row">
          <input type="number" id="inp_${key}" min="0" max="200" step="0.1" placeholder="${km.toFixed(1)}">
          <button class="btn-set" onclick="manualSet('${key}')">SET</button>
        </div>
      </div>

      <div>
        <button class="color-toggle-btn" onclick="toggleColor('${key}')">
          <span class="swatch-preview" style="background:${color}"></span>
          OBS COLOR — ${color}
        </button>
        <div class="color-panel" id="colorPanel_${key}">
          <div class="color-palette">${swatches}</div>
        </div>
      </div>

    </div>
  </div>`;
}

let prevKm = {};

onValue(ref(db, 'runners'), snap => {
  const data = snap.val() || {};
  window._cur = data;
  let html = '';
  for (let i = 0; i < 4; i++) {
    const key = 'runner'+(i+1);
    const r = data[key] || {};
    if (prevKm[key] !== undefined && Math.abs((r.km||0)-prevKm[key]) > 0.01) {
      addLog(`[GPS] ${r.name||key} → ${(r.km||0).toFixed(2)} กม.`);
    }
    prevKm[key] = r.km || 0;
    html += renderCard(key, r, i);
  }
  document.getElementById('grid').innerHTML = html;
  document.getElementById('connStatus').textContent = 'เชื่อมต่อ Firebase · อัปเดตอัตโนมัติ';
});
</script>
</body>
</html>
