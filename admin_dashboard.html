<html lang="th">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Marathon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #080808;
  color: #fff;
  padding: 24px 20px;
  min-height: 100vh;
}

/* ── TOP BAR ── */
.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding-bottom: 18px;
}
.top-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.top-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 4px;
  letter-spacing: 0.08em;
}
.live-badge {
  background: transparent;
  border: 1px solid #4ade80;
  color: #4ade80;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 14px;
  letter-spacing: .1em;
  font-family: 'Orbitron', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
}
.dot {
  width: 6px; height: 6px;
  background: #4ade80;
  display: inline-block;
  animation: bl 1.4s infinite;
}
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── MINIMAP SECTION ── */
.minimap-section {
  background: #111;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 3px solid #FFDD00;
  padding: 18px;
  margin-bottom: 24px;
}
.minimap-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.minimap-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.minimap-meta {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: #FFDD00;
}
.minimap-wrap {
  background: #0a0a0a;
  border: 1px solid rgba(255,255,255,0.04);
  padding: 12px;
  border-radius: 4px;
}
svg.race-map {
  display: block;
  width: 100%;
  height: auto;
  max-height: 500px;
}
.route-shape {
  fill: #FFDD00;
  filter: drop-shadow(0 0 6px rgba(255, 221, 0, 0.3));
}
.start-finish-line { fill: #fff; }

.runner-dot {
  transition: transform 1.5s cubic-bezier(.4,0,.2,1);
}
.runner-dot circle {
  stroke: #fff;
  stroke-width: 4;
  filter: drop-shadow(0 0 12px var(--rdot));
}
.runner-dot text {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 700;
  fill: #000;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

/* ── RUNNER CARD ── */
.runner-card {
  background: #111111;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 3px solid var(--card-color, #4ade80);
  padding: 16px;
  position: relative;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.rank-badge {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  background: var(--card-color, #4ade80);
  color: #000;
  flex-shrink: 0;
}
.runner-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.runner-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
  letter-spacing: 0.04em;
}

/* ── PROGRESS ── */
.bar-wrap {
  height: 6px;
  background: rgba(255,255,255,0.07);
  margin-bottom: 8px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  transition: width 1s ease;
  background: var(--card-color, #4ade80);
}
.km-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 16px;
}
.km-main {
  font-weight: 800;
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
}
.km-of { color: rgba(255,255,255,0.3); font-size: 12px; }

/* ── CONTROLS ── */
.controls {
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 14px;
  display: grid;
  gap: 10px;
}
.ctrl-label {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  letter-spacing: .1em;
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
}
.ctrl-row { display: flex; gap: 8px; }
.ctrl-row input {
  flex: 1; padding: 8px 10px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 14px;
  font-family: 'Sarabun', sans-serif;
  outline: none;
}
.ctrl-row input:focus { border-color: var(--card-color, #4ade80); }
.btn-set {
  padding: 8px 14px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  cursor: pointer;
  letter-spacing: 0.05em;
  white-space: nowrap;
  transition: background 0.15s, border-color 0.15s;
}
.btn-set:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.3); }
.btn-set:active { background: rgba(255,255,255,0.12); }
.btn-set.alt { border-color: var(--card-color,#4ade80); color: var(--card-color,#4ade80); }
.btn-set.alt:hover { background: rgba(255,255,255,0.05); }

/* ── COLOR TOGGLE ── */
.color-toggle-btn {
  width: 100%;
  padding: 7px 12px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: border-color 0.15s;
}
.color-toggle-btn:hover { border-color: var(--card-color,#4ade80); color: #fff; }
.color-toggle-btn .swatch-preview {
  width: 12px; height: 12px;
  background: var(--card-color, #4ade80);
  display: inline-block;
  flex-shrink: 0;
}
.color-panel {
  display: none;
  padding: 10px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: none;
}
.color-panel.open { display: block; }
.color-palette {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.color-swatch {
  aspect-ratio: 1;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.active { border-color: #fff; }
.color-swatch.active::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  font-weight: 800;
  font-size: 13px;
}

/* ── LOG ── */
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 10px;
}
.log-box {
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 16px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  line-height: 2;
  max-height: 160px;
  overflow-y: auto;
  font-family: monospace;
}
.log-entry { border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 2px; }
.log-entry:last-child { border-bottom: none; }
.conn-status {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  margin-top: 14px;
  letter-spacing: 0.06em;
}
</style>

  '#FACC15','#EC4899','#22D3EE','#A855F7',
  '#10ff49','#F97316','#EF4444','#FFFFFF',
  '#3B82F6','#06B6D4','#F59E0B','#84CC16',
];
const DEFAULT_COLORS = ['#FACC15','#EC4899','#22D3EE','#A855F7'];

// ╔══════════════════════════════════════╗
// ║   BUILD CENTERLINE FROM ROAD         ║
// ╚══════════════════════════════════════╝
const ns = 'http://www.w3.org/2000/svg';
const svgEl = document.querySelector('svg.race-map');
const roadEl = document.getElementById('roadShape');
const dAttr = roadEl.getAttribute('d');

function splitSubPaths(d) {
  return d.split(/(?=[Mm])/).filter(s => s.trim().length > 0);
}
function samplePath(pathEl, n) {
  const total = pathEl.getTotalLength();
  const pts = [];
  for (let i = 0; i < n; i++) {
    const len = (i / (n - 1)) * total;
    const pt = pathEl.getPointAtLength(len);
    pts.push({ x: pt.x, y: pt.y });
  }
  return pts;
}
function dist2(a, b) { const dx = a.x - b.x, dy = a.y - b.y; return dx*dx + dy*dy; }
function nearestIdx(pt, list) {
  let best = 0, bd = Infinity;
  for (let i = 0; i < list.length; i++) {
    const d = dist2(pt, list[i]);
    if (d < bd) { bd = d; best = i; }
  }
  return best;
}
function ptsToPath(pts) {
  if (pts.length === 0) return '';
  let d = `M ${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 1; i < pts.length; i++) {
    d += ` L ${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
  }
  return d;
}

const subs = splitSubPaths(dAttr);
const subPathEls = subs.map(d => {
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', d);
  p.setAttribute('fill', 'none');
  p.style.display = 'none';
  svgEl.appendChild(p);
  return p;
});

const N = 600;
const outerPts = samplePath(subPathEls[0], N);
const innerPts = subPathEls[1] ? samplePath(subPathEls[1], N) : [];

let centerPts = [];
if (innerPts.length > 0) {
  for (let i = 0; i < outerPts.length; i++) {
    const o = outerPts[i];
    const j = nearestIdx(o, innerPts);
    const inn = innerPts[j];
    centerPts.push({ x: (o.x + inn.x) / 2, y: (o.y + inn.y) / 2 });
  }
}

// Reverse so runners go DOWN first from start
centerPts.reverse();

// Find start position (white bar) and rotate array to start there
const START_TARGET = { x: 194, y: 897 };
let bestIdx = 0, bestD = Infinity;
for (let i = 0; i < centerPts.length; i++) {
  const d = dist2(centerPts[i], START_TARGET);
  if (d < bestD) { bestD = d; bestIdx = i; }
}
const rotated = centerPts.slice(bestIdx).concat(centerPts.slice(0, bestIdx));
rotated.push(rotated[0]); // close loop

const centerPath = document.getElementById('centerPath');
centerPath.setAttribute('d', ptsToPath(rotated));
const totalLength = centerPath.getTotalLength();

const TOTAL_KM = 42.195;
function kmToPoint(km) {
  const clamped = Math.min(TOTAL_KM, Math.max(0, km));
  return centerPath.getPointAtLength((clamped / TOTAL_KM) * totalLength);
}

// Create 4 map runner dots
const mapRunnersGroup = document.getElementById('mapRunners');
function ensureMapDot(idx, color) {
  let dot = document.getElementById('mapDot-' + idx);
  if (!dot) {
    dot = document.createElementNS(ns, 'g');
    dot.classList.add('runner-dot');
    dot.id = 'mapDot-' + idx;
    dot.innerHTML = `
      <circle r="28" fill="${color}"/>
      <text>${idx+1}</text>
    `;
    mapRunnersGroup.appendChild(dot);
  } else {
    dot.querySelector('circle').setAttribute('fill', color);
  }
  dot.style.setProperty('--rdot', color);
  return dot;
}

function updateMapDot(idx, km, color, goal) {
  // Scale km to TOTAL_KM if goal != 42.195 (for shorter race goals)
  // Actually use km directly since centerline = 42.195 km
  // But cap at goal so dot doesn't go past their target
  const displayKm = Math.min(km, goal);
  const pt = kmToPoint(displayKm);
  const dot = ensureMapDot(idx, color);
  dot.setAttribute('transform', `translate(${pt.x}, ${pt.y})`);
}

// ╔══════════════════════════════════════╗
// ║      ORIGINAL ADMIN LOGIC            ║
// ╚══════════════════════════════════════╝
const logs = [];
function addLog(msg) {
  const t = new Date().toLocaleTimeString('th-TH');
  logs.unshift('['+t+'] '+msg);
  if (logs.length > 30) logs.pop();
  document.getElementById('logBox').innerHTML = logs.map(l=>`<div class="log-entry">${l}</div>`).join('');
}

window.manualSet = function(key) {
  const val = parseFloat(document.getElementById('inp_'+key).value);
  const goal = parseFloat(document.getElementById('goalInp_'+key).value) || 42;
  if (isNaN(val) || val < 0 || val > goal) { alert('ใส่ตัวเลข 0–'+goal+' กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/'+key+'/km'), parseFloat(val.toFixed(2)));
  addLog(`[Manual] ${name} → ${val.toFixed(2)} กม.`);
};

window.setGoal = function(key) {
  const val = parseFloat(document.getElementById('goalInp_'+key).value);
  if (isNaN(val) || val < 1 || val > 200) { alert('ใส่เป้าหมาย 1–200 กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/'+key+'/goal'), val);
  addLog(`[Goal] ${name} → ${val} กม.`);
};

window.initRunners = async function() {
  if (!confirm('สร้างข้อมูลเริ่มต้นทั้ง 4 คน? (จะ reset km เป็น 0)')) return;
  const defaults = [
    { name: 'Runner 1', goal: 42, color: '#FACC15' },
    { name: 'Runner 2', goal: 42, color: '#EC4899' },
    { name: 'Runner 3', goal: 42, color: '#22D3EE' },
    { name: 'Runner 4', goal: 42, color: '#A855F7' },
  ];
  for (let i = 0; i < 4; i++) {
    const key = 'runner'+(i+1);
    const existing = (window._cur[key] || {});
    await set(ref(db, 'runners/'+key), {
      name:  existing.name  || defaults[i].name,
      goal:  existing.goal  || defaults[i].goal,
      color: existing.color || defaults[i].color,
      km: 0,
    });
  }
  addLog('[Init] สร้างข้อมูลนักวิ่ง 4 คนเรียบร้อย');
};

window.setName = function(key) {
  const val = document.getElementById('nameInp_'+key).value.trim();
  if (!val) { alert('ใส่ชื่อนักวิ่งด้วยครับ'); return; }
  set(ref(db, 'runners/'+key+'/name'), val);
  addLog(`[Name] runner${key.slice(-1)} → ${val}`);
};

window.setColor = function(key, color) {
  set(ref(db, 'runners/'+key+'/color'), color);
  const name = (window._cur[key] || {}).name || key;
  addLog(`[Color] ${name} → ${color}`);
};

window.toggleColor = function(key) {
  const panel = document.getElementById('colorPanel_'+key);
  panel.classList.toggle('open');
};

window._cur = {};

function renderCard(key, data, idx) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = data.name || ('นักวิ่ง '+(idx+1));
  const color = data.color || DEFAULT_COLORS[idx];
  const pct = Math.min(100, (km/goal)*100);
  const acc = data.acc ? '±'+data.acc+'ม.' : '—';

  const swatches = PALETTE.map(c =>
    `<div class="color-swatch ${c.toLowerCase()===color.toLowerCase()?'active':''}"
          style="background:${c}"
          onclick="setColor('${key}','${c}')"
          title="${c}"></div>`
  ).join('');

  return `
  <div class="runner-card" style="--card-color:${color}">
    <div class="card-header">
      <div class="rank-badge">${idx+1}</div>
      <div>
        <div class="runner-name">${name}</div>
        <div class="runner-sub">GPS: ${acc}</div>
      </div>
    </div>

    <div class="bar-wrap"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
    <div class="km-row">
      <span class="km-main">${km.toFixed(2)} KM</span>
      <span class="km-of">/ ${goal} km · ${pct.toFixed(0)}%</span>
    </div>

    <div class="controls">

      <div>
        <span class="ctrl-label">ชื่อนักวิ่ง</span>
        <div class="ctrl-row">
          <input type="text" id="nameInp_${key}" placeholder="${name}" value="${name}">
          <button class="btn-set alt" onclick="setName('${key}')">SET</button>
        </div>
      </div>

      <div>
        <span class="ctrl-label">เป้าหมาย (กม.)</span>
        <div class="ctrl-row">
          <input type="number" id="goalInp_${key}" min="1" max="200" step="1" value="${goal}">
          <button class="btn-set alt" onclick="setGoal('${key}')">SET</button>
        </div>
      </div>

      <div>
        <span class="ctrl-label">แก้ระยะด้วยมือ</span>
        <div class="ctrl-row">
          <input type="number" id="inp_${key}" min="0" max="200" step="0.1" placeholder="${km.toFixed(1)}">
          <button class="btn-set" onclick="manualSet('${key}')">SET</button>
        </div>
      </div>

      <div>
        <button class="color-toggle-btn" onclick="toggleColor('${key}')">
          <span class="swatch-preview" style="background:${color}"></span>
          OBS COLOR — ${color}
        </button>
        <div class="color-panel" id="colorPanel_${key}">
          <div class="color-palette">${swatches}</div>
        </div>
      </div>

    </div>
  </div>`;
}

let prevKm = {};

onValue(ref(db, 'runners'), snap => {
  const data = snap.val() || {};
  window._cur = data;
  let html = '';
  for (let i = 0; i < 4; i++) {
    const key = 'runner'+(i+1);
    const r = data[key] || {};
    if (prevKm[key] !== undefined && Math.abs((r.km||0)-prevKm[key]) > 0.01) {
      addLog(`[GPS] ${r.name||key} → ${(r.km||0).toFixed(2)} กม.`);
    }
    prevKm[key] = r.km || 0;
    html += renderCard(key, r, i);

    // 🆕 Update map dot
    const color = r.color || DEFAULT_COLORS[i];
    const km = r.km || 0;
    const goal = r.goal || 42;
    updateMapDot(i, km, color, goal);
  }
  document.getElementById('grid').innerHTML = html;
  document.getElementById('connStatus').textContent = 'เชื่อมต่อ Firebase · อัปเดตอัตโนมัติ';
});
</script>
</body>
</html>
