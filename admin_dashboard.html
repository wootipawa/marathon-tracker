<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Marathon Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=JetBrains+Mono:wght@500;600;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000;
  --panel: #0a0a0a;
  --panel-2: #111;
  --line: rgba(255,255,255,0.08);
  --line-strong: rgba(255,255,255,0.14);
  --text: #fff;
  --muted: #6b7280;
  --green: #16a34a;
  --green-light: #4ade80;
  --red: #dc2626;
  --purple: #a855f7;
  --yellow: #eab308;
  --cyan: #06b6d4;
  --blue: #3b82f6;
}

body {
  font-family: 'Inter', 'Sarabun', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  padding: 0;
}

/* ── Top header ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: #050505;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(8px);
}
.top-left { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  display: flex; align-items: center; gap: 8px;
}
.brand-square {
  width: 28px; height: 28px;
  background: var(--text);
  color: #000;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Inter', sans-serif;
  font-weight: 900;
  font-size: 14px;
  letter-spacing: -.02em;
  border-radius: 3px;
}
.brand-text {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.brand-text .sub { color: var(--muted); margin-left: 8px; font-weight: 600; letter-spacing: .08em; }

.live-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border: 1px solid var(--red);
  background: rgba(220,38,38,0.1);
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--red);
}
.live-indicator .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1.4s infinite;
}

.top-right {
  display: flex; align-items: center; gap: 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}
.top-right .item { display: flex; align-items: center; gap: 6px; }
.top-right .item-val { color: var(--text); font-weight: 700; }

/* ── Main content ── */
.main {
  padding: 24px;
  max-width: 1280px;
  margin: 0 auto;
}

.section-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::before {
  content: '';
  width: 12px; height: 1px;
  background: var(--muted);
}

/* ── Runner grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.card-head {
  display: grid;
  grid-template-columns: 56px 38px 1fr;
  gap: 10px;
  padding: 12px;
  align-items: center;
  border-bottom: 1px solid var(--line);
  background: #050505;
}

/* F1-style number tag */
.tag {
  display: grid;
  grid-template-columns: 22px 30px;
  height: 26px;
  border-radius: 3px;
  overflow: hidden;
}
.tag .num {
  background: #1a1a1a;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
}
.tag .code {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: .04em;
  display: flex; align-items: center; justify-content: center;
}
.t1 .code { background: #f59e0b; color: #000; }
.t2 .code { background: #06b6d4; color: #000; }
.t3 .code { background: #ef4444; color: #fff; }
.t4 .code { background: #22c55e; color: #000; }

.flag-btn {
  width: 38px; height: 32px;
  background: #111;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  padding: 0;
}
.flag-btn:hover { border-color: var(--cyan); background: #1a1a1a; }

.runner-info { min-width: 0; }
.runner-info .name {
  font-family: 'Sarabun', sans-serif;
  font-size: 14px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -.005em;
}
.runner-info .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: .04em;
}

/* Status pill */
.status-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px;
  border: 1px solid;
  border-radius: 2px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .08em;
  margin-left: 6px;
  vertical-align: middle;
}
.status-pill.live { color: var(--green-light); border-color: var(--green); background: rgba(22,163,74,0.1); }
.status-pill.done { color: var(--purple); border-color: var(--purple); background: rgba(168,85,247,0.1); }
.status-pill.idle { color: var(--muted); border-color: var(--muted); }

/* Card body */
.card-body { padding: 14px; flex: 1; }

.dist-row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
}
.dist-now {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
  line-height: 1;
}
.dist-now .unit {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-left: 4px;
  letter-spacing: .08em;
}
.dist-goal {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .04em;
}
.dist-goal .pct {
  color: var(--text);
  font-weight: 700;
  margin-left: 6px;
}

/* Progress bar */
.bar-track {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 14px;
}
.bar-fill {
  height: 100%;
  width: 0%;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}
.t1 .bar-fill { background: #f59e0b; }
.t2 .bar-fill { background: #06b6d4; }
.t3 .bar-fill { background: #ef4444; }
.t4 .bar-fill { background: #22c55e; }

/* Controls */
.ctrl-section { display: grid; gap: 10px; }
.ctrl-block {
  display: grid; gap: 5px;
}
.ctrl-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
}
.ctrl-row {
  display: flex; gap: 6px;
}
.ctrl-row input {
  flex: 1; min-width: 0;
  padding: 7px 10px;
  background: #050505;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  outline: none;
  transition: border-color .15s;
}
.ctrl-row input:focus { border-color: var(--cyan); }
.btn {
  padding: 7px 14px;
  border: 1px solid;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  cursor: pointer;
  background: transparent;
  transition: all .15s;
  white-space: nowrap;
}
.btn-cyan { color: var(--cyan); border-color: var(--cyan); }
.btn-cyan:hover { background: var(--cyan); color: #000; }
.btn-green { color: var(--green-light); border-color: var(--green); }
.btn-green:hover { background: var(--green); color: #000; }

/* ── Activity log ── */
.log-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 4px;
}
.log-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #050505;
}
.log-head .t {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  color: var(--muted);
  text-transform: uppercase;
}
.log-body {
  padding: 6px 0;
  max-height: 220px;
  overflow-y: auto;
}
.log-body::-webkit-scrollbar { width: 4px; }
.log-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.log-entry {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 10px;
  padding: 5px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.log-entry:last-child { border-bottom: none; }
.log-time { color: var(--muted); }
.log-msg { color: var(--text); }
.log-msg .tag-mini {
  display: inline-block;
  padding: 1px 5px;
  margin-right: 6px;
  border-radius: 2px;
  font-size: 9px;
  letter-spacing: .08em;
  font-weight: 700;
}
.tag-mini.gps { background: rgba(74,222,128,0.15); color: var(--green-light); }
.tag-mini.man { background: rgba(234,179,8,0.15); color: var(--yellow); }
.tag-mini.cfg { background: rgba(6,182,212,0.15); color: var(--cyan); }
.tag-mini.flag { background: rgba(168,85,247,0.15); color: var(--purple); }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── Flag picker modal ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  z-index: 100;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--panel);
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  padding: 20px;
  width: 100%; max-width: 480px;
  max-height: 80vh;
  display: flex; flex-direction: column;
}
.modal-title {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.modal-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 14px;
  letter-spacing: .04em;
}
.flag-search {
  width: 100%; padding: 10px 12px;
  background: #050505;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  margin-bottom: 12px;
}
.flag-search:focus { border-color: var(--cyan); }
.flag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
  gap: 4px;
  overflow-y: auto;
  padding-right: 4px;
}
.flag-grid::-webkit-scrollbar { width: 4px; }
.flag-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.flag-cell {
  background: #050505;
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 3px;
  padding: 8px 4px;
  cursor: pointer;
  text-align: center;
  transition: all .12s;
}
.flag-cell:hover { border-color: var(--cyan); background: #0d0d0d; }
.flag-cell .em { font-size: 22px; line-height: 1.2; }
.flag-cell .nm {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: .06em;
  font-weight: 600;
}
.modal-close {
  margin-top: 12px; padding: 10px;
  background: transparent;
  border: 1px solid var(--line-strong);
  border-radius: 3px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .15em;
  cursor: pointer;
}
.modal-close:hover { background: #1a1a1a; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <div class="brand-mark">
      <div class="brand-square">M</div>
      <div class="brand-text">MARATHON <span class="sub">ADMIN</span></div>
    </div>
  </div>
  <div class="top-right">
    <div class="item">
      <span>RUNNERS</span>
      <span class="item-val">4</span>
    </div>
    <div class="item">
      <span>STATUS</span>
      <span class="item-val" id="connStatus">CONNECTING</span>
    </div>
    <div class="live-indicator">
      <span class="dot"></span>
      <span>LIVE</span>
    </div>
  </div>
</div>

<div class="main">

  <div class="section-label">Runners</div>
  <div class="grid" id="grid"></div>

  <div class="section-label">Activity Log</div>
  <div class="log-panel">
    <div class="log-head">
      <div class="t">Recent Updates</div>
    </div>
    <div class="log-body" id="logBox"></div>
  </div>

</div>

<!-- Flag picker modal -->
<div class="modal-bg" id="flagModal" onclick="closeFlagPicker(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Select Flag</div>
    <div class="modal-sub" id="flagModalSub">RUNNER</div>
    <input type="text" class="flag-search" id="flagSearch" placeholder="Search (e.g. Thai, JP, ญี่ปุ่น)" oninput="filterFlags()">
    <div class="flag-grid" id="flagGrid"></div>
    <button class="modal-close" onclick="closeFlagPicker()">CLOSE</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db = db; window._ref = ref; window._set = set;

const logs = [];
function addLog(type, msg) {
  const t = new Date().toLocaleTimeString('th-TH', { hour12: false });
  logs.unshift({ time: t, type, msg });
  if (logs.length > 30) logs.pop();
  document.getElementById('logBox').innerHTML = logs.map(l => {
    const tagClass = { gps: 'gps', man: 'man', cfg: 'cfg', flag: 'flag' }[l.type] || 'cfg';
    const tagText = { gps: 'GPS', man: 'MAN', cfg: 'CFG', flag: 'FLG' }[l.type] || 'LOG';
    return `<div class="log-entry">
      <div class="log-time">${l.time}</div>
      <div class="log-msg"><span class="tag-mini ${tagClass}">${tagText}</span>${l.msg}</div>
    </div>`;
  }).join('');
}
window._addLog = addLog;

function makeCode(name, idx) {
  if (!name) return ['R1','R2','R3','R4'][idx];
  const en = (name.match(/[A-Za-z]+/g) || []).join('').toUpperCase();
  if (en.length >= 3) return en.slice(0, 3);
  if (en.length > 0) return en.padEnd(3, 'X');
  const th = name.replace(/\s/g, '').slice(0, 3);
  return th || ['R1','R2','R3','R4'][idx];
}

window.manualSet = function(key, idx) {
  const val = parseFloat(document.getElementById('inp_' + key).value);
  const goal = parseFloat(document.getElementById('goalInp_' + key).value) || 42;
  if (isNaN(val) || val < 0 || val > goal) { alert('ใส่ตัวเลข 0–' + goal + ' กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/' + key + '/km'), parseFloat(val.toFixed(2)));
  addLog('man', `${name} → ${val.toFixed(2)} KM`);
};

window.setGoal = function(key, idx) {
  const val = parseFloat(document.getElementById('goalInp_' + key).value);
  if (isNaN(val) || val < 1 || val > 200) { alert('ใส่เป้าหมาย 1–200 กม.'); return; }
  const name = (window._cur[key] || {}).name || key;
  set(ref(db, 'runners/' + key + '/goal'), val);
  addLog('cfg', `${name} GOAL → ${val} KM`);
};

window._cur = {};

function renderCard(key, data, idx) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = data.name || ('นักวิ่ง ' + (idx + 1));
  const flag = data.flag || '🏁';
  const code = makeCode(name, idx);
  const pct = Math.min(100, (km / goal) * 100);
  const acc = data.acc ? '±' + data.acc + 'M' : '—';
  const team = `t${idx + 1}`;
  const status = km >= goal ? 'done' : (km > 0 ? 'live' : 'idle');
  const statusText = status === 'done' ? 'FINISH' : (status === 'live' ? 'LIVE' : 'WAIT');

  return `
    <div class="card ${team}">
      <div class="card-head">
        <div class="tag ${team}">
          <div class="num">${idx + 1}</div>
          <div class="code">${code}</div>
        </div>
        <button class="flag-btn" onclick="openFlagPicker('${key}')" title="Edit flag">${flag}</button>
        <div class="runner-info">
          <div class="name">${name}<span class="status-pill ${status}">${statusText}</span></div>
          <div class="meta">GPS · ${acc}</div>
        </div>
      </div>

      <div class="card-body">
        <div class="dist-row">
          <div class="dist-now">${km.toFixed(2)}<span class="unit">KM</span></div>
          <div class="dist-goal">/ ${goal} KM <span class="pct">${pct.toFixed(0)}%</span></div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct.toFixed(1)}%"></div></div>

        <div class="ctrl-section">
          <div class="ctrl-block">
            <div class="ctrl-label">Goal Distance</div>
            <div class="ctrl-row">
              <input type="number" id="goalInp_${key}" min="1" max="200" step="1" value="${goal}">
              <button class="btn btn-green" onclick="setGoal('${key}',${idx})">SET</button>
            </div>
          </div>
          <div class="ctrl-block">
            <div class="ctrl-label">Manual Override</div>
            <div class="ctrl-row">
              <input type="number" id="inp_${key}" min="0" max="200" step="0.1" placeholder="${km.toFixed(1)}">
              <button class="btn btn-cyan" onclick="manualSet('${key}',${idx})">APPLY</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

let prevKm = {};

onValue(ref(db, 'runners'), snap => {
  const data = snap.val() || {};
  window._cur = data;
  let html = '';
  for (let i = 0; i < 4; i++) {
    const key = 'runner' + (i + 1);
    const r = data[key] || {};

    if (prevKm[key] !== undefined && Math.abs((r.km || 0) - prevKm[key]) > 0.01) {
      addLog('gps', `${r.name || key} → ${(r.km || 0).toFixed(2)} KM`);
    }
    prevKm[key] = r.km || 0;

    html += renderCard(key, r, i);
  }
  document.getElementById('grid').innerHTML = html;
  document.getElementById('connStatus').textContent = 'CONNECTED';
});
</script>

<script>
// Flag picker
const FLAGS = [
  ['🇹🇭','Thailand','TH','ไทย'],['🇺🇸','USA','US','อเมริกา'],['🇬🇧','UK','GB','อังกฤษ'],
  ['🇯🇵','Japan','JP','ญี่ปุ่น'],['🇰🇷','S.Korea','KR','เกาหลี'],['🇨🇳','China','CN','จีน'],
  ['🇩🇪','Germany','DE','เยอรมัน'],['🇫🇷','France','FR','ฝรั่งเศส'],['🇮🇹','Italy','IT','อิตาลี'],
  ['🇪🇸','Spain','ES','สเปน'],['🇵🇹','Portugal','PT','โปรตุเกส'],['🇳🇱','Netherlands','NL','เนเธอร์แลนด์'],

let pickerKey = null;

window.openFlagPicker = function(key) {
  pickerKey = key;
  const data = (window._cur || {})[key] || {};
  document.getElementById('flagModalSub').textContent = (data.name || 'RUNNER').toUpperCase();
  document.getElementById('flagSearch').value = '';
  renderFlags(FLAGS);
  document.getElementById('flagModal').classList.add('show');
};

window.closeFlagPicker = function(e) {
  if (e && e.target.id !== 'flagModal') return;
  document.getElementById('flagModal').classList.remove('show');
};

window.filterFlags = function() {
  const q = document.getElementById('flagSearch').value.toLowerCase().trim();
  if (!q) return renderFlags(FLAGS);
  const filtered = FLAGS.filter(f =>
    f[1].toLowerCase().includes(q) ||
    f[2].toLowerCase().includes(q) ||
    f[3].toLowerCase().includes(q)
  );
  renderFlags(filtered);
};

function renderFlags(list) {
  const grid = document.getElementById('flagGrid');
  grid.innerHTML = list.map(f =>
    `<div class="flag-cell" onclick="pickFlag('${f[0]}')">
      <div class="em">${f[0]}</div>
      <div class="nm">${f[2]}</div>
    </div>`
  ).join('');
}

window.pickFlag = function(emoji) {
  if (!pickerKey) return;
  window._set(window._ref(window._db, 'runners/' + pickerKey + '/flag'), emoji);
  const name = ((window._cur || {})[pickerKey] || {}).name || pickerKey;
  window._addLog('flag', `${name} FLAG → ${emoji}`);
  document.getElementById('flagModal').classList.remove('show');
};
</script>
