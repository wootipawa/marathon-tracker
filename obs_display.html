<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Marathon OBS Display</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: transparent;
  font-family: 'Sarabun', sans-serif;
  padding: 12px;
  width: 680px;
}
.container {
  background: rgba(0,0,0,0.82);
  border-radius: 14px;
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,0.08);
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.title {
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.upd {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: .06em;
}
.runner-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  animation: slideIn .4s ease;
}
.runner-row:last-child { margin-bottom: 0; }
@keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }

.rank {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800;
  flex-shrink: 0;
}
.flag {
  font-size: 22px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
}
.name {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  width: 92px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-wrap {
  flex: 1;
  height: 22px;
  background: rgba(255,255,255,0.1);
  border-radius: 100px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 8px;
  min-width: 0;
}
.bar-text {
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.km-badge {
  font-size: 12px;
  font-weight: 700;
  min-width: 96px;
  text-align: right;
  flex-shrink: 0;
}
.dot-live {
  width: 7px; height: 7px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.r1 { background: #f59e0b; color: #3b1f00; }
.r2 { background: #9ca3af; color: #1a1a1a; }
.r3 { background: #cd7c45; color: #2a1000; }
.r4 { background: #34d399; color: #022c1e; }

/* ── DEMO mode (เปิดด้วย ?demo=1) ── */
body.demo {
  background:
    radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,212,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%, rgba(255,45,85,0.08) 0%, transparent 60%),
    #0a0a0f !important;
  min-height: 100vh;
}
body.demo::before {
  content: 'DEMO MODE';
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  padding: 4px 12px;
  background: rgba(255,179,0,0.15);
  border: 1px solid rgba(255,179,0,0.5);
  border-radius: 4px;
  color: #ffb300;
  font-size: 10px; letter-spacing: 2px;
  font-weight: 700;
  z-index: 1000;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title"><span class="dot-live"></span><span id="evtTitle">MARATHON LIVE</span></div>
    <div class="upd" id="upd">—</div>
  </div>
  <div id="rows"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ===== Firebase =====
const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
// =====================

const colors = [
  { rank: 'r1', fill: '#f59e0b', text: '#3b1f00', km: '#f59e0b' },
  { rank: 'r2', fill: '#9ca3af', text: '#1a1a1a', km: '#9ca3af' },
  { rank: 'r3', fill: '#cd7c45', text: '#2a1000', km: '#cd7c45' },
  { rank: 'r4', fill: '#34d399', text: '#022c1e', km: '#34d399' },
];

function render(data) {
  const rows = document.getElementById('rows');
  let html = '';
  for (let i = 0; i < 4; i++) {
    const r = data['runner' + (i + 1)] || { name: 'นักวิ่ง ' + (i + 1), km: 0 };
    const goal = r.goal || 42;
    const flag = r.flag || '🏁';
    const km = r.km || 0;
    const pct = Math.min(100, (km / goal) * 100);
    const c = colors[i];
    const showInBar = pct > 16;
    html += `
      <div class="runner-row">
        <div class="rank ${c.rank}">${i + 1}</div>
        <div class="flag">${flag}</div>
        <div class="name">${r.name || 'นักวิ่ง ' + (i + 1)}</div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${pct.toFixed(1)}%;background:${c.fill}">
            ${showInBar ? `<span class="bar-text" style="color:${c.text}">${km.toFixed(1)} กม.</span>` : ''}
          </div>
        </div>
        <div class="km-badge" style="color:${c.km}">${km.toFixed(1)} / ${goal} กม.</div>
      </div>`;
  }
  rows.innerHTML = html;
  document.getElementById('upd').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH');
}

// ── Demo mode ──
const params = new URLSearchParams(window.location.search);
if (params.get('demo') === '1') {
  document.body.classList.add('demo');
  runDemo();
} else {
  onValue(ref(db, 'runners'), snap => render(snap.val() || {}));
}

function runDemo() {
  const demo = {
    runner1: { name: 'สมชาย ใจดี', flag: '🇹🇭', goal: 42, km: 0, _speed: 0.18 },
    runner2: { name: 'John Smith', flag: '🇺🇸', goal: 21, km: 0, _speed: 0.32 },
    runner3: { name: 'Yuki Tanaka', flag: '🇯🇵', goal: 10, km: 0, _speed: 0.45 },
    runner4: { name: 'Maria Garcia', flag: '🇪🇸', goal: 5, km: 0, _speed: 0.55 },
  };
  render(demo);
  setInterval(() => {
    Object.values(demo).forEach(r => {
      if (r.km < r.goal) {
        r.km = Math.min(r.goal, r.km + r._speed * (0.7 + Math.random() * 0.6));
      }
    });
    render(demo);
  }, 2000);
}
</script>
</body>
</html>
