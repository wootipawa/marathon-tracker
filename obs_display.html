<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Marathon OBS — Single Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #FACC15;
  --c2: #EC4899;
  --c3: #00f2ea;
  --c4: #A855F7;
  --green: #10ff49;
  --accent: #00f2ea;
  --panel-bg: #4a4a4a;
  --footer-bg: #333;
  --accent-bottom: #555;
}

html, body {
  background: transparent !important;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
  color: #ffffff;
}

/* ── Container — bottom-left ── */
.stage {
  position: fixed;
  left: 60px;
  bottom: 60px;
  width: 950px;
  opacity: 0;
  animation: fadeIn 0.6s 0.1s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CARD ── */
.card {
  width: 100%;
  background-color: var(--panel-bg);
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* ── HEADER ── */
.header {
  position: relative;
  height: 80px;
  border-bottom: 5px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
}

.rank-box {
  background-color: var(--accent);
  color: #ffffff;
  width: 100px;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 55px;
  font-weight: bold;
  position: absolute;
  left: 0;
  top: 0;
}

.name-box {
  color: #ffffff;
  font-size: 42px;
  letter-spacing: 5px;
  text-transform: uppercase;
  text-align: center;
  width: 100%;
}

/* ── CONTENT ── */
.content {
  padding: 50px 0;
  text-align: center;
  color: #ffffff;
}

.distance-value {
  font-size: 130px;
  font-weight: 400;
  line-height: 1;
}

.unit {
  font-size: 50px;
  margin-left: 15px;
  font-weight: 300;
  font-family: 'Kanit', sans-serif;
}

/* ── FOOTER ── */
.footer {
  width: 100%;
  background-color: var(--footer-bg);
}

.labels {
  display: flex;
  justify-content: space-around;
  color: #ffffff;
  font-size: 20px;
  padding: 12px 0;
  font-weight: 300;
  font-family: 'Kanit', sans-serif;
}

.progress-container {
  width: 100%;
  height: 18px;
  background-color: #ffffff;
  display: flex;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background-color: var(--green);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(16,255,73,0.5);
}

.bottom-accent {
  height: 12px;
  background-color: var(--accent-bottom);
  width: 100%;
}

/* ── No data ── */
.no-data {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
}

/* ── Demo mode ── */
body.demo {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%) !important;
}
body.demo::before {
  content: 'DEMO';
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  padding: 4px 12px;
  background: rgba(0,242,234,0.15);
  border: 1px solid rgba(0,242,234,0.5);
  border-radius: 3px;
  color: #00f2ea;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 0.18em;
  z-index: 1000;
}
</style>
</head>
<body>

<div class="stage" id="stage" style="display:none;">
  <div class="card">

    <!-- HEADER -->
    <div class="header">
      <div class="rank-box" id="numTag">1</div>
      <div class="name-box" id="nameText">RUNNER</div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <span class="distance-value" id="kmNum">0.00</span><span class="unit">KM</span>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="labels">
        <span>10K</span>
        <span>20K</span>
        <span>30K</span>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="barFill"></div>
      </div>
      <div class="bottom-accent"></div>
    </div>

  </div>
</div>

<div class="no-data" id="noData">WAITING FOR DATA…</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const params    = new URLSearchParams(window.location.search);
const runnerNum = Math.min(4, Math.max(1, parseInt(params.get('runner') || '1')));
const isDemo    = params.get('demo') === '1';

// Color per runner — accent changes rank-box & header border
const COLORS = ['#FACC15', '#EC4899', '#00f2ea', '#A855F7'];
document.documentElement.style.setProperty('--accent', COLORS[runnerNum - 1]);
document.getElementById('numTag').textContent = runnerNum;

function formatName(name, idx) {
  if (!name) return 'RUNNER ' + idx;
  const en = name.match(/[A-Za-z]+/g);
  if (en && en.length >= 2) {
    return (en[0][0] + '.' + en[en.length - 1]).toUpperCase();
  }
  return name.toUpperCase();
}

function render(data) {
  const km   = data.km   || 0;
  const goal = data.goal || 42;
  const name = data.name || ('Runner ' + runnerNum);
  const pct  = Math.min(100, (km / goal) * 100);

  document.getElementById('stage').style.display = 'block';
  document.getElementById('noData').style.display = 'none';

  document.getElementById('nameText').textContent = formatName(name, runnerNum);
  document.getElementById('kmNum').textContent    = km.toFixed(2);
  document.getElementById('barFill').style.width  = pct.toFixed(2) + '%';
}

if (isDemo) {
  document.body.classList.add('demo');
  const demoData = [
    { name: 'Ronaldo',     goal: 42, km: 10.00, _speed: 0.18 },
    { name: 'John Smith',  goal: 21, km: 5.4,   _speed: 0.32 },
    { name: 'Yuki Tanaka', goal: 10, km: 3.2,   _speed: 0.45 },
    { name: 'M.Tengnon',   goal: 42, km: 12.67, _speed: 0.55 },
  ];
  const r = demoData[runnerNum - 1];
  render(r);
  setInterval(() => {
    if (r.km < r.goal) r.km = Math.min(r.goal, r.km + r._speed * (0.7 + Math.random() * 0.6));
    render(r);
  }, 2000);
} else {
  const key = 'runner' + runnerNum;
  onValue(ref(db, 'runners/' + key), snap => {
    const data = snap.val();
    if (data) render(data);
  });
}
</script>
</body>
</html>
