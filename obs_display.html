<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>OBS Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  gap: 40px;
}

h1 {
  font-size: 22px;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.btn {
  width: 260px;
  height: 120px;
  border: 2px solid var(--color);
  background: rgba(0,0,0,0.6);
  color: #fff;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s, transform 0.1s;
  text-decoration: none;
}
.btn:hover {
  background: rgba(255,255,255,0.07);
  transform: scale(1.03);
}
.btn:active { transform: scale(0.98); }

.btn .num {
  font-size: 48px;
  font-weight: 700;
  color: var(--color);
  line-height: 1;
}
.btn .label {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.5);
}
</style>
</head>
<body>

<h1>OBS Display — เลือก Runner</h1>

<div class="grid">
  <a class="btn" style="--color:#FACC15" href="obs_display.html?runner=1" target="_blank">
    <span class="num">1</span>
    <span class="label">RUNNER 1</span>
  </a>
  <a class="btn" style="--color:#EC4899" href="obs_display.html?runner=2" target="_blank">
    <span class="num">2</span>
    <span class="label">RUNNER 2</span>
  </a>
  <a class="btn" style="--color:#00f2ea" href="obs_display.html?runner=3" target="_blank">
    <span class="num">3</span>
    <span class="label">RUNNER 3</span>
  </a>
  <a class="btn" style="--color:#A855F7" href="obs_display.html?runner=4" target="_blank">
    <span class="num">4</span>
    <span class="label">RUNNER 4</span>
  </a>
</div>

</body>
</html>
