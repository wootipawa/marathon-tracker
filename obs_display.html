<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marathon OBS Display</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Audiowide&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #FACC15;   /* Yellow */
  --c2: #EC4899;   /* Pink */
  --c3: #22D3EE;   /* Cyan */
  --c4: #A855F7;   /* Purple */
  --green: #10ff49;
  --accent: var(--c1);
}

html, body {
  background: transparent !important;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Orbitron', sans-serif;
}

/* ── Runner picker (top-right corner) ── */
.picker {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  gap: 6px;
  z-index: 100;
  background: rgba(0,0,0,0.7);
  padding: 6px;
  border-radius: 6px;
  backdrop-filter: blur(6px);
}
.picker-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.5);
  display: flex;
  align-items: center;
  padding: 0 8px 0 4px;
  font-weight: 700;
}
.pick-btn {
  width: 38px;
  height: 38px;
  border: 2px solid transparent;
  background: #1a1a1a;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pick-btn:hover {
  background: #2a2a2a;
}
.pick-btn.active {
  background: var(--btn-color);
  color: #000;
  border-color: var(--btn-color);
}

/* Hide picker when in OBS (URL has &hide=1) */
body.hide-picker .picker { display: none; }

/* ── Card ── */
.card {
  position: fixed;
  left: 60px;
  bottom: 60px;
  width: 700px;
  background-color: #4a4a4a;
  display: none;
  flex-direction: column;
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  opacity: 0;
  animation: fadeIn 0.6s 0.1s forwards;
}
.card.show { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Header ── */
.header {
  display: flex;
  align-items: stretch;
  height: 70px;
  border-bottom: 4px solid var(--accent);
}

.rank-box {
  background-color: var(--accent);
  color: white;
  width: 80px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 50px;
  font-weight: bold;
  font-family: 'Orbitron', sans-serif;
  line-height: 1;
  flex-shrink: 0;
}

.name-box {
  flex-grow: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 38px;
  letter-spacing: 3px;
  font-family: 'Orbitron', 'Kanit', sans-serif;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 12px;
  min-width: 0;
}

.name-box.shrink-1 { font-size: 30px; letter-spacing: 2px; }
.name-box.shrink-2 { font-size: 24px; letter-spacing: 1px; }

/* ── Content (KM display) ── */
.content {
  padding: 40px 0;
  text-align: center;
  color: white;
}

/* AUDIOWIDE — only here */
.distance-value {
  font-size: 110px;
  font-weight: 400;
  line-height: 1;
  font-family: 'Audiowide', sans-serif;
  letter-spacing: 0.02em;
}

.unit {
  font-size: 45px;
  margin-left: 10px;
  font-weight: 400;
  font-family: 'Audiowide', sans-serif;
  letter-spacing: 0.04em;
}

/* ── Footer ── */
.footer {
  width: 100%;
  background-color: #333;
  position: relative;
}

.labels {
  display: flex;
  justify-content: space-around;
  color: #ffffff;
  font-size: 18px;
  padding: 10px 0;
  font-weight: 300;
  font-family: 'Orbitron', sans-serif;
}

.progress-container {
  width: 100%;
  height: 15px;
  background-color: #e0e0e0;
  display: flex;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background-color: var(--green);
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}

.bottom-accent {
  height: 10px;
  background-color: #555;
  width: 100%;
}

/* No data */
.no-data {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 28px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
}
body.has-data .no-data { display: none; }

/* Demo mode */
body.demo {
  background:
    linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
    linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
    linear-gradient(-45deg, transparent 75%, #1a1a1a 75%) !important;
  background-size: 30px 30px !important;
  background-position: 0 0, 0 15px, 15px -15px, -15px 0px !important;
  background-color: #0d0d0d !important;
}
body.demo::after {
  content: 'DEMO';
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  padding: 4px 12px;
  background: rgba(234,179,8,0.2);
  border: 1px solid rgba(234,179,8,0.6);
  border-radius: 3px;
  color: #FCD34D;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  letter-spacing: 0.18em;
  font-weight: 700;
  z-index: 1000;
}
</style>
</head>
<body>

<!-- Runner picker (top-right) -->
<div class="picker" id="picker">
  <span class="picker-label">RUNNER</span>
  <button class="pick-btn" data-r="1" style="--btn-color:#FACC15">1</button>
  <button class="pick-btn" data-r="2" style="--btn-color:#EC4899">2</button>
  <button class="pick-btn" data-r="3" style="--btn-color:#22D3EE">3</button>
  <button class="pick-btn" data-r="4" style="--btn-color:#A855F7">4</button>
</div>

<!-- The OBS card -->
<div class="card" id="card">
  <div class="header">
    <div class="rank-box" id="rank">1</div>
    <div class="name-box" id="name">RUNNER</div>
  </div>

  <div class="content">
    <span class="distance-value" id="distance">0.00</span><span class="unit">KM</span>
  </div>

  <div class="footer">
    <div class="labels">
      <span>10K</span>
      <span>20K</span>
      <span>30K</span>
    </div>
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="bottom-accent"></div>
  </div>
</div>

<div class="no-data" id="noData">WAITING FOR DATA…</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const runnerNum = Math.min(4, Math.max(1, parseInt(params.get('runner') || '1')));
const isDemo = params.get('demo') === '1';
const hidePicker = params.get('hide') === '1';

const COLORS = ['#FACC15', '#EC4899', '#22D3EE', '#A855F7'];

document.documentElement.style.setProperty('--accent', COLORS[runnerNum - 1]);
document.getElementById('rank').textContent = runnerNum;

if (hidePicker) {
  document.body.classList.add('hide-picker');
}

// Mark active picker button
document.querySelectorAll('.pick-btn').forEach(btn => {
  if (parseInt(btn.dataset.r) === runnerNum) btn.classList.add('active');
  btn.addEventListener('click', () => {
    const r = btn.dataset.r;
    // Preserve other params
    const newParams = new URLSearchParams(window.location.search);
    newParams.set('runner', r);
    window.location.search = '?' + newParams.toString();
  });
});

// Auto-shrink long names
function fitName(text) {
  const el = document.getElementById('name');
  el.classList.remove('shrink-1', 'shrink-2');
  el.textContent = text;
  requestAnimationFrame(() => {
    if (el.scrollWidth > el.clientWidth) {
      el.classList.add('shrink-1');
      requestAnimationFrame(() => {
        if (el.scrollWidth > el.clientWidth) {
          el.classList.add('shrink-2');
        }
      });
    }
  });
}

function render(data) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = (data.name || ('RUNNER ' + runnerNum)).toUpperCase();
  const pct = Math.min(100, (km / goal) * 100);

  document.body.classList.add('has-data');
  document.getElementById('card').classList.add('show');

  fitName(name);
  document.getElementById('distance').textContent = km.toFixed(2);
  document.getElementById('progressBar').style.width = pct.toFixed(2) + '%';
}

if (isDemo) {
  document.body.classList.add('demo');
  const demoData = [
    { name: 'Ronaldo',           goal: 42, km: 10.00, _speed: 0.18 },
    { name: 'Lionel Messi',      goal: 42, km: 12.67, _speed: 0.32 },
    { name: 'สมชาย ใจดี',         goal: 10, km: 3.20,  _speed: 0.45 },
    { name: 'Yuki Tanaka',       goal: 21, km: 5.40,  _speed: 0.55 },
  ];
  const r = demoData[runnerNum - 1];
  render(r);
  setInterval(() => {
    if (r.km < r.goal) r.km = Math.min(r.goal, r.km + r._speed * (0.7 + Math.random() * 0.6));
    render(r);
  }, 2000);
} else {
  const key = 'runner' + runnerNum;
  onValue(ref(db, 'runners/' + key), snap => {
    const data = snap.val();
    if (data) render(data);
  });
}
</script>

</body>
</html>
