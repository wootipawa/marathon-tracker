<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Marathon OBS — Single Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Sarabun:wght@600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 4 base colors */
  --c1: #FACC15;   /* Yellow */
  --c2: #EC4899;   /* Pink */
  --c3: #22D3EE;   /* Cyan */
  --c4: #A855F7;   /* Purple */

  --panel-bg: rgba(70, 70, 70, 0.55);
  --panel-bg-strong: rgba(50, 50, 50, 0.65);
  --text: #ffffff;
  --muted: rgba(255, 255, 255, 0.65);
  --track-bg: rgba(255, 255, 255, 0.85);
}

html, body {
  background: transparent !important;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Sarabun', sans-serif;
  color: var(--text);
}

/* ── Container ── */
.stage {
  position: fixed;
  left: 60px;
  bottom: 60px;
  width: min(900px, calc(100vw - 120px));
  opacity: 0;
  animation: fadeIn 0.6s 0.1s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TOP ROW: Number tag + Name ── */
.top-row {
  display: grid;
  grid-template-columns: 130px 1fr;
  height: 100px;
}

.num-tag {
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Oswald', sans-serif;
  font-size: 78px;
  font-weight: 700;
  color: #0a0a0a;
  line-height: 1;
  letter-spacing: -0.02em;
}

.name-box {
  background: var(--panel-bg);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 30px;
  border-bottom: 4px solid var(--accent);
}
.name-text {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(38px, 5vw, 58px);
  letter-spacing: 0.02em;
  color: var(--text);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  text-align: center;
}

/* ── BOTTOM ROW: Distance + scale + progress ── */
.bottom-box {
  background: var(--panel-bg);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  padding: 24px 40px 0 40px;
  position: relative;
}

.km-display {
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 30px;
}
.km-num {
  font-size: clamp(80px, 11vw, 130px);
  letter-spacing: -0.04em;
  color: var(--text);
}
.km-unit {
  font-size: clamp(28px, 3.5vw, 42px);
  font-weight: 600;
  color: var(--text);
  margin-left: 6px;
  letter-spacing: 0.02em;
}

/* ── Scale ticks ── */
.scale-row {
  position: relative;
  height: 28px;
  margin-bottom: 8px;
}
.scale-tick {
  position: absolute;
  transform: translateX(-50%);
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 22px;
  color: var(--text);
  letter-spacing: 0.04em;
}

/* ── Progress bar ── */
.bar-track {
  height: 8px;
  background: var(--track-bg);
  position: relative;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}

/* ── Demo mode hint ── */
body.demo::before {
  content: 'DEMO · ?runner=1 to switch';
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  padding: 4px 12px;
  background: rgba(234,179,8,0.2);
  border: 1px solid rgba(234,179,8,0.6);
  border-radius: 3px;
  color: #FCD34D;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 0.18em;
  font-weight: 600;
  z-index: 1000;
}
body.demo {
  background:
    radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%) !important;
}

/* No-data state */
.no-data {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Oswald', sans-serif;
  font-size: 32px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
}
body.demo .no-data { display: none; }
</style>
</head>
<body>

<div class="stage" id="stage" style="display: none;">

  <!-- Top: number tag + name -->
  <div class="top-row">
    <div class="num-tag" id="numTag">1</div>
    <div class="name-box">
      <div class="name-text" id="nameText">RUNNER</div>
    </div>
  </div>

  <!-- Bottom: KM + scale + bar -->
  <div class="bottom-box">
    <div class="km-display">
      <span class="km-num" id="kmNum">0.00</span><span class="km-unit">KM</span>
    </div>

    <div class="scale-row" id="scaleRow"></div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill"></div>
    </div>
  </div>

</div>

<div class="no-data" id="noData">WAITING FOR DATA…</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── Read ?runner=N from URL (default 1) ──
const params = new URLSearchParams(window.location.search);
const runnerNum = Math.min(4, Math.max(1, parseInt(params.get('runner') || '1')));
const isDemo = params.get('demo') === '1';

const COLORS = ['#FACC15', '#EC4899', '#22D3EE', '#A855F7'];
const accent = COLORS[runnerNum - 1];

// Apply accent color
document.documentElement.style.setProperty('--accent', accent);

// Set number tag
document.getElementById('numTag').textContent = runnerNum;

// ── Make code from name (used as fallback) ──
function formatName(name, idx) {
  if (!name) return 'RUNNER ' + idx;
  // If has space and English: "John Smith" → "J. SMITH"
  const en = name.match(/[A-Za-z]+/g);
  if (en && en.length >= 2) {
    return (en[0][0] + '.' + en[en.length - 1]).toUpperCase();
  }
  // Single English word or Thai → uppercase as-is
  return name.toUpperCase();
}

// ── Render scale ticks based on goal ──
function renderScale(goal) {
  const row = document.getElementById('scaleRow');
  row.innerHTML = '';
  // Determine step (5km if goal<=15, 10km otherwise)
  const step = goal <= 15 ? 5 : (goal <= 50 ? 10 : 20);
  // Show ticks at step, 2*step, 3*step ... but not at goal itself or 0
  for (let k = step; k < goal; k += step) {
    const tick = document.createElement('div');
    tick.className = 'scale-tick';
    tick.textContent = k + 'K';
    tick.style.left = ((k / goal) * 100) + '%';
    row.appendChild(tick);
  }
}

// ── Render runner data ──
function render(data) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = data.name || ('Runner ' + runnerNum);
  const pct = Math.min(100, (km / goal) * 100);

  document.getElementById('stage').style.display = 'block';
  document.getElementById('noData').style.display = 'none';

  document.getElementById('nameText').textContent = formatName(name, runnerNum);
  document.getElementById('kmNum').textContent = km.toFixed(2);
  document.getElementById('barFill').style.width = pct.toFixed(2) + '%';
  renderScale(goal);
}

// ── Demo mode ──
if (isDemo) {
  document.body.classList.add('demo');
  const demoData = [
    { name: 'สมชาย ใจดี', goal: 42, km: 12.67, _speed: 0.18 },
    { name: 'John Smith', goal: 21, km: 5.4, _speed: 0.32 },
    { name: 'Yuki Tanaka', goal: 10, km: 3.2, _speed: 0.45 },
    { name: 'M.Tengnon', goal: 42, km: 12.67, _speed: 0.55 },
  ];
  const r = demoData[runnerNum - 1];
  render(r);
  setInterval(() => {
    if (r.km < r.goal) r.km = Math.min(r.goal, r.km + r._speed * (0.7 + Math.random() * 0.6));
    render(r);
  }, 2000);
} else {
  // Live mode
  const key = 'runner' + runnerNum;
  onValue(ref(db, 'runners/' + key), snap => {
    const data = snap.val();
    if (data) render(data);
  });
}
</script>
</body>
</html>
