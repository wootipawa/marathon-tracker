<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Marathon OBS — Single Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Sarabun:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c1: #FACC15;   /* Yellow */
  --c2: #EC4899;   /* Pink */
  --c3: #22D3EE;   /* Cyan */
  --c4: #A855F7;   /* Purple */
  --green: #00ff66;

  --panel-bg: rgba(75, 75, 75, 0.85);
  --text: #ffffff;
}

html, body {
  background: transparent !important;
  width: 100vw;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Russo One', 'Sarabun', sans-serif;
  color: var(--text);
}

/* ── Container — bottom-left ── */
.stage {
  position: fixed;
  left: 60px;
  bottom: 60px;
  width: min(960px, calc(100vw - 120px));
  opacity: 0;
  animation: fadeIn 0.6s 0.1s forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TOP ROW: Number tag (square) + Name ── */
.top-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  height: 120px;
  position: relative;
}

.num-tag {
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Russo One', sans-serif;
  font-size: 80px;
  color: #ffffff;
  line-height: 1;
}

.name-box {
  background: var(--panel-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 30px;
  position: relative;
}

/* Accent color stripe BELOW the name row */
.accent-stripe {
  position: absolute;
  left: 120px;
  right: 0;
  bottom: 0;
  height: 7px;
  background: var(--accent);
}

.name-text {
  font-family: 'Russo One', sans-serif;
  font-size: clamp(42px, 5.5vw, 64px);
  letter-spacing: 0.04em;
  color: var(--text);
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
  text-align: center;
  line-height: 1;
}

/* ── BOTTOM BOX ── */
.bottom-box {
  background: var(--panel-bg);
  padding: 36px 0 18px 0;
  position: relative;
  margin-top: 7px;
}

.km-display {
  text-align: center;
  font-family: 'Russo One', sans-serif;
  line-height: 1;
  margin-bottom: 38px;
  padding: 0 40px;
}
.km-num {
  font-size: clamp(85px, 11.5vw, 138px);
  letter-spacing: 0.01em;
  color: var(--text);
}
.km-unit {
  font-size: clamp(28px, 3.5vw, 42px);
  color: var(--text);
  margin-left: 8px;
  letter-spacing: 0.04em;
}

/* ── Scale ticks ── */
.scale-row {
  position: relative;
  height: 36px;
  margin-bottom: 14px;  /* gap between scale and bar */
}
.scale-tick {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  font-family: 'Russo One', sans-serif;
  font-size: 28px;
  color: #ffffff;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

/* ── Progress bar — raised so gray edge shows below ── */
.bar-wrap {
  position: relative;
  width: 100%;
  /* slight bottom margin so the panel's gray bottom edge is visible UNDER the bar */
  margin-bottom: 6px;
}
.bar-track {
  height: 16px;
  background: #ffffff;
  position: relative;
  overflow: hidden;
  width: 100%;
}
.bar-fill {
  height: 100%;
  background: var(--green);
  width: 0%;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 16px rgba(0,255,102,0.5);
}

/* No-data state */
.no-data {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Russo One', sans-serif;
  font-size: 32px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
}
body.demo .no-data { display: none; }

body.demo {
  background:
    radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%) !important;
}
body.demo::before {
  content: 'DEMO';
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  padding: 4px 12px;
  background: rgba(234,179,8,0.2);
  border: 1px solid rgba(234,179,8,0.6);
  border-radius: 3px;
  color: #FCD34D;
  font-family: 'Russo One', sans-serif;
  font-size: 12px;
  letter-spacing: 0.18em;
  z-index: 1000;
}
</style>
</head>
<body>

<div class="stage" id="stage" style="display: none;">

  <div class="top-row">
    <div class="num-tag" id="numTag">1</div>
    <div class="name-box">
      <div class="name-text" id="nameText">RUNNER</div>
    </div>
    <div class="accent-stripe"></div>
  </div>

  <div class="bottom-box">
    <div class="km-display">
      <span class="km-num" id="kmNum">0.00</span><span class="km-unit">KM</span>
    </div>

    <div class="scale-row" id="scaleRow"></div>

    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>
  </div>

</div>

<div class="no-data" id="noData">WAITING FOR DATA…</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const runnerNum = Math.min(4, Math.max(1, parseInt(params.get('runner') || '1')));
const isDemo = params.get('demo') === '1';

const COLORS = ['#FACC15', '#EC4899', '#22D3EE', '#A855F7'];
const accent = COLORS[runnerNum - 1];

document.documentElement.style.setProperty('--accent', accent);
document.getElementById('numTag').textContent = runnerNum;

function formatName(name, idx) {
  if (!name) return 'RUNNER ' + idx;
  const en = name.match(/[A-Za-z]+/g);
  if (en && en.length >= 2) {
    return (en[0][0] + '.' + en[en.length - 1]).toUpperCase();
  }
  return name.toUpperCase();
}

// Scale ticks always at 25/50/75% — visual reference only
function renderScale() {
  const row = document.getElementById('scaleRow');
  row.innerHTML = '';
  [
    { label: '10K', pos: 25 },
    { label: '20K', pos: 50 },
    { label: '30K', pos: 75 }
  ].forEach(t => {
    const el = document.createElement('div');
    el.className = 'scale-tick';
    el.textContent = t.label;
    el.style.left = t.pos + '%';
    row.appendChild(el);
  });
}

function render(data) {
  const km = data.km || 0;
  const goal = data.goal || 42;
  const name = data.name || ('Runner ' + runnerNum);
  const pct = Math.min(100, (km / goal) * 100);

  document.getElementById('stage').style.display = 'block';
  document.getElementById('noData').style.display = 'none';

  document.getElementById('nameText').textContent = formatName(name, runnerNum);
  document.getElementById('kmNum').textContent = km.toFixed(2);
  document.getElementById('barFill').style.width = pct.toFixed(2) + '%';
}

renderScale();

if (isDemo) {
  document.body.classList.add('demo');
  const demoData = [
    { name: 'Ronaldo',     goal: 42, km: 10.00, _speed: 0.18 },
    { name: 'John Smith',  goal: 21, km: 5.4,   _speed: 0.32 },
    { name: 'Yuki Tanaka', goal: 10, km: 3.2,   _speed: 0.45 },
    { name: 'M.Tengnon',   goal: 42, km: 12.67, _speed: 0.55 },
  ];
  const r = demoData[runnerNum - 1];
  render(r);
  setInterval(() => {
    if (r.km < r.goal) r.km = Math.min(r.goal, r.km + r._speed * (0.7 + Math.random() * 0.6));
    render(r);
  }, 2000);
} else {
  const key = 'runner' + runnerNum;
  onValue(ref(db, 'runners/' + key), snap => {
    const data = snap.val();
    if (data) render(data);
  });
}
</script>
</body>
</html>
