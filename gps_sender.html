<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GPS ช่างภาพ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Sarabun', sans-serif;
  background: #080808;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

.card {
  background: #111;
  border: 1px solid rgba(255,255,255,0.07);
  border-top: 3px solid #4ade80;
  padding: 28px 24px;
  width: 100%;
  max-width: 400px;
}

/* ── HEADER ── */
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid #4ade80;
  color: #4ade80;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  padding: 3px 10px;
}
.dot { width: 6px; height: 6px; background: #4ade80; display: inline-block; animation: bl 1.4s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }

.sub {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

/* ── WARN ── */
.route-warn {
  background: rgba(251,191,36,0.06);
  border: 1px solid rgba(251,191,36,0.2);
  border-left: 3px solid #fbbf24;
  padding: 10px 14px;
  font-size: 12px;
  color: rgba(251,211,77,0.8);
  margin-bottom: 20px;
  line-height: 1.6;
}

/* ── FIELDS ── */
.field { margin-bottom: 14px; }
label {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  display: block;
  margin-bottom: 7px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
select, input {
  width: 100%;
  padding: 11px 14px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 15px;
  font-family: 'Sarabun', sans-serif;
  appearance: none;
  outline: none;
  transition: border-color 0.2s;
}
select:focus, input:focus { border-color: #4ade80; }
select option { background: #111; }

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.15s;
  margin-top: 10px;
  text-transform: uppercase;
}
.btn-start { background: #4ade80; color: #052e16; }
.btn-start:hover { background: #22c55e; }
.btn-start:active { transform: scale(0.98); }
.btn-stop { background: transparent; border: 1px solid #ef4444; color: #ef4444; display: none; }
.btn-stop:hover { background: rgba(239,68,68,0.08); }
.btn-stop:active { transform: scale(0.98); }

/* ── STATUS ── */
.status-box {
  margin-top: 18px;
  background: #080808;
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 3px solid #4ade80;
  padding: 16px;
  display: none;
}
.status-box.show { display: block; }
.status-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.status-row:last-child { border-bottom: none; }
.s-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.s-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #4ade80;
}

.err {
  font-family: 'Orbitron', sans-serif;
  color: #ef4444;
  font-size: 11px;
  margin-top: 12px;
  text-align: center;
  letter-spacing: 0.06em;
  display: none;
}
</style>
</head>
<body>
<div class="card">

  <div class="card-header">
    <h1>GPS Sender</h1>
    <div class="live-badge"><span class="dot"></span>GPS</div>
  </div>
  <p class="sub">เปิดทิ้งไว้ระหว่างวิ่ง · ส่งอัตโนมัติทุก 5 วินาที</p>

  <div class="route-warn">
    ต้องเปิดหน้าจอทิ้งไว้ตลอด และอนุญาต GPS เมื่อ Safari ถาม
  </div>

  <div class="field">
    <label>คุณคือช่างภาพคนที่</label>
    <select id="runnerSel">
      <option value="runner1">ช่างภาพ 1</option>
      <option value="runner2">ช่างภาพ 2</option>
      <option value="runner3">ช่างภาพ 3</option>
      <option value="runner4">ช่างภาพ 4</option>
    </select>
  </div>

  <div class="field">
    <label>ชื่อนักวิ่งที่ตาม</label>
    <input type="text" id="runnerName" placeholder="ชื่อนักวิ่ง">
  </div>

  <div class="field">
    <label>ระยะทางเป้าหมาย (กม.)</label>
    <input type="number" id="goalKm" placeholder="42" value="42" min="1" max="200" step="1">
  </div>

  <div class="field">
    <label>จุดเริ่มต้น (lat, lng)</label>
    <input type="text" id="startCoord" placeholder="เช่น 13.7563, 100.5018">
  </div>

  <button class="btn btn-start" id="btnStart" onclick="startTracking()">เริ่มส่ง GPS</button>
  <button class="btn btn-stop" id="btnStop" onclick="stopTracking()">หยุดส่ง GPS</button>

  <div class="status-box" id="statusBox">
    <div class="status-row">
      <span class="s-label"><span class="dot"></span>สถานะ</span>
      <span class="s-val" id="stStatus">กำลังส่ง...</span>
    </div>
    <div class="status-row">
      <span class="s-label">ระยะทาง</span>
      <span class="s-val" id="stKm">0.00 KM</span>
    </div>
    <div class="status-row">
      <span class="s-label">ความแม่นยำ</span>
      <span class="s-val" id="stAcc">—</span>
    </div>
    <div class="status-row">
      <span class="s-label">อัปเดตล่าสุด</span>
      <span class="s-val" id="stTime">—</span>
    </div>
  </div>

  <p class="err" id="errMsg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB9RxP_jFuecXLyT7szJMnQYywIeVuqk34",
  authDomain: "marathon-tracker-f7e06.firebaseapp.com",
  databaseURL: "https://marathon-tracker-f7e06-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "marathon-tracker-f7e06",
  storageBucket: "marathon-tracker-f7e06.firebasestorage.app",
  messagingSenderId: "217799472779",
  appId: "1:217799472779:web:0cb0a05d3768059de5c68e",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let watchId = null;
let startLat = null, startLng = null;
let lastLat = null, lastLng = null;
let totalKm = 0;
let intervalId = null;
let lastPos = null;
let currentGoal = 42;

function toRad(d) { return d * Math.PI / 180; }
function haversine(la1, lo1, la2, lo2) {
  const R = 6371;
  const dLa = toRad(la2-la1), dLo = toRad(lo2-lo1);
  const a = Math.sin(dLa/2)**2 + Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.startTracking = async function() {
  const key  = document.getElementById('runnerSel').value;
  const name = document.getElementById('runnerName').value.trim() || ('ช่างภาพ ' + key.slice(-1));
  const goal = parseFloat(document.getElementById('goalKm').value) || 42;
  const coordRaw = document.getElementById('startCoord').value.trim();
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  currentGoal = goal;

  if (coordRaw) {
    const parts = coordRaw.split(',');
    if (parts.length === 2) {
      startLat = parseFloat(parts[0].trim());
      startLng = parseFloat(parts[1].trim());
    }
  }

  if (!navigator.geolocation) {
    err.textContent = 'เบราว์เซอร์นี้ไม่รองรับ GPS กรุณาใช้ Safari';
    err.style.display = 'block'; return;
  }

  await set(ref(db, 'runners/'+key+'/name'), name);
  await set(ref(db, 'runners/'+key+'/goal'), goal);
  await set(ref(db, 'runners/'+key+'/km'), 0);

  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnStop').style.display  = 'block';
  document.getElementById('statusBox').classList.add('show');
  document.getElementById('stStatus').textContent = 'กำลังหา GPS...';

  watchId = navigator.geolocation.watchPosition(
    pos => { lastPos = pos; updateFromPos(pos, key, name); },
    e   => { err.textContent = 'GPS Error: '+e.message; err.style.display='block'; },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );

  intervalId = setInterval(() => {
    if (lastPos) updateFromPos(lastPos, key, name);
  }, 5000);
};

async function updateFromPos(pos, key, name) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  if (!startLat) { startLat = lat; startLng = lng; }
  if (lastLat !== null) {
    const d = haversine(lastLat, lastLng, lat, lng);
    if (d > 0.005 && d < 0.5) totalKm += d;
  }
  lastLat = lat; lastLng = lng;

  const km = Math.min(currentGoal, totalKm);
  const snap = await get(ref(db, 'runners/'+key));
  const existing = snap.val() || {};

  await set(ref(db, 'runners/'+key), {
    ...existing,
    name,
    goal: currentGoal,
    km: parseFloat(km.toFixed(3)),
    lat, lng,
    acc: Math.round(acc)
  });

  document.getElementById('stStatus').textContent = 'SENDING';
  document.getElementById('stKm').textContent     = km.toFixed(2) + ' KM';
  document.getElementById('stAcc').textContent    = '±' + Math.round(acc) + 'M';
  document.getElementById('stTime').textContent   = new Date().toLocaleTimeString('th-TH');
}

window.stopTracking = function() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (intervalId) clearInterval(intervalId);
  watchId = null; intervalId = null;
  document.getElementById('btnStart').style.display = 'block';
  document.getElementById('btnStop').style.display  = 'none';
  document.getElementById('statusBox').classList.remove('show');
};
</script>
</body>
</html>
